<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Your Cart — NovaShop</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="nav"></div>
  <main class="container">
    <section class="hero"><h1>Your cart</h1></section>
    <div id="alert"></div>
    <div class="two-col">
      <div class="panel"><div id="items"></div></div>
      <div class="panel">
        <h3 style="margin-top:0">Order summary</h3>
        <div class="summary"><span class="muted">Subtotal</span><span id="subtotal">$0.00</span></div>
        <div class="summary"><span class="muted">Shipping</span><span>Free</span></div>
        <div class="summary total"><span>Total</span><span id="total">$0.00</span></div>
        <a href="/checkout.html" class="btn btn-primary btn-block mt" id="checkoutBtn">Proceed to checkout</a>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/chat.js"></script>
</body>
</html>
